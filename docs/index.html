    <h1>is-antibot — Detect antibot protection from 30+ providers</h1>
    <p>Know exactly who blocked your request and why. is-antibot performs static HTTP response analysis so Node.js scrapers and data pipelines can detect challenges and react accordingly.</p>
    <h2 id="quick-start">Quick start</h2>
    <p>Install the package and pass any HTTP response with headers, HTML, URL, and status code.</p>
    <pre><code>npm install is-antibot</code></pre>
    <h2 id="how-detection-works">How it works</h2>
    <p>is-antibot inspects headers, cookies, HTML fingerprints, response URLs, and provider-specific status codes to classify bot protection challenges.</p>
    <h2 id="providers">Providers</h2>
    <ul>
      <li><strong>Antibot providers</strong> — Cloudflare, Akamai, DataDome, PerimeterX, Kasada, Imperva, AWS WAF, Vercel, Anubis, Reblaze, Sucuri, and more.</li>
      <li><strong>CAPTCHA providers</strong> — reCAPTCHA, hCaptcha, Cloudflare Turnstile, FunCaptcha, GeeTest, Friendly Captcha, Captcha.eu, and QCloud Captcha.</li>
      <li><strong>Five detection signals</strong> — headers, cookies, HTML, URL, and status code.</li>
      <li><strong>Zero config</strong> — works with fetch, got, axios, undici, node-fetch, or raw HTTP responses.</li>
    </ul>
